name: Build & Release VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            media-src/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: npm --prefix ./media-src ci --legacy-peer-deps

      - name: Build extension
        run: npm run build

      - name: Read extension version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VSIX_NAME=lobehub-markdown-editor-${VERSION}.vsix" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: npx @vscode/vsce package --out "${VSIX_NAME}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lobehub-markdown-editor-vsix
          path: ${{ env.VSIX_NAME }}

      - name: Verify Open VSX token
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "Missing OVSX_PAT secret. Add it in GitHub repository settings before publishing tags." >&2
            exit 1
          fi

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx ovsx publish "${VSIX_NAME}" -p "${OVSX_PAT}"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_NAME }}
          generate_release_notes: true
